<!DOCTYPE html>
<html>
    <head>
        <title>React Basics</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            function App() {
                return (
                    <>
                        <ProductDetails item="Cotton socks" price="10.90" discount="5.45" imageSrc="cotton-socks.png" />
                        <ProductDetails item="Tennis balls" price="6.00" imageSrc="tennis-balls.png" />
                        <ProductDetails item="Plain T-Shirt" price="7.99" imageSrc="plain-t-shirt.png" />
                    </>
                );
            }

            function ProductDetails({ item, price, discount, imageSrc }) {
                return (
                    <>
                        <img src={imageSrc} width="100" />
                        <p>{item}</p>
                        {/*{ discount !== undefined && (
                            <>
                                <del>Price: ${price}</del>
                                <p>Discount Price: ${discount}</p>
                            </>
                        )}
                        { discount === undefined && (
                            <>
                                <p>Price: ${price}</p>
                            </>
                        )}*/}
                        <Price price={price} discount={discount} />
                        <button>Add to Cart</button>
                        <p></p>
                        <br />
                    </>
                );
            }

            function Price({ price, discount }) {
                return discount ? (
                    <>
                        <del>Price: ${price}</del>
                        <p>Discount Price: ${discount}</p>
                    </>
                ) : (
                    <p>Price: ${price}</p>
                );
            }

            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
