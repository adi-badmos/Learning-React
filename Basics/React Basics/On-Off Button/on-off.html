<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="on-off.css">
        <title>On Off Button</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            function Button() {
                const [ isButtonOn, setIsButtonOn ] = React.useState(true);

                function toggleButton() {
                    isButtonOn ? setIsButtonOn(false) : setIsButtonOn(true);
                }

                return (
                    <>
                        <button
                            className={isButtonOn ? 'on-button' : 'off-button'}
                            onClick={toggleButton}
                        >{isButtonOn ? 'ON' : 'OFF'}
                        </button>
                    </>
                );
            }

            function App() {
                return (
                    <>
                        <Button />
                    </>
                );
            }

            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
